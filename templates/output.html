<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Conversion Result</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h2 class="mb-4">Converted Images</h2>
      <a href="/" class="btn btn-secondary mb-3">Convert Another PDF</a>
      <div class="row">
        {% for image in images %}
        <div class="col-md-3 mb-4">
          <div class="card">
            <img
              src="{{ url_for('download_image', folder=folder, filename=image) }}"
              class="card-img-top"
              alt="Page Image"
            />
            <div class="card-body text-center">
              <a
                href="{{ url_for('download_image', folder=folder, filename=image) }}"
                class="btn btn-success btn-sm"
                download
                >Download</a
              >
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
