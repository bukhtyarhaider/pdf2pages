<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF to Images - Conversion Result</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body data-folder="{{ folder }}">
    <div class="container py-5 fade-in">
      <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
          <h2 style="font-family: 'Outfit', sans-serif; font-weight: 700" class="mb-1">
            Converted Images
          </h2>
          <p class="text-muted mb-0">PDF: {{ folder }}</p>
        </div>
        <a href="/" class="btn-secondary-premium text-decoration-none">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Convert Another
        </a>
      </div>

      <div class="d-flex gap-2 mb-4">
        <button id="select-all" class="btn btn-sm btn-outline-primary rounded-pill px-3">Select All</button>
        <button id="deselect-all" class="btn btn-sm btn-outline-secondary rounded-pill px-3">Deselect All</button>
      </div>

      <div class="image-grid">
        {% for image in images %}
        <div class="image-card">
          <input type="checkbox" class="selection-checkbox" />
          <img
            src="{{ url_for('download_image', folder=folder, filename=image) }}"
            alt="Page {{ loop.index }}"
            data-filename="{{ image }}"
          />
          <div class="card-overlay">
            <a
              href="{{ url_for('download_image', folder=folder, filename=image) }}"
              class="btn-premium btn-sm"
              download
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download
            </a>
          </div>
        </div>
        {% endfor %}
      </div>

      <!-- Actions Bar -->
      <div class="actions-bar">
        <div class="floating-actions">
          <div class="d-flex align-items-center gap-2 me-3 pe-3 border-end">
            <span class="badge-count" id="selected-count">0</span>
            <span class="text-muted small fw-medium">selected</span>
          </div>
          
          <button id="download-selected" class="btn-premium py-2 px-4" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download Selected (ZIP)
          </button>
          
          <button id="download-all" class="btn-secondary-premium py-2 px-4 d-flex align-items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download All
          </button>
        </div>
      </div>
    </div>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
