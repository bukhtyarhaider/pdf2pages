<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pdf2Pages | Professional PDF Converter</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      @theme {
        --color-accent: #3b82f6; /* Trustworthy Blue */
        --font-sans: "Inter", sans-serif;
      }
      body {
        font-family: var(--font-sans);
        background-color: #000;
        color: #fff;
      }
      .card-border {
        border: 1px solid #262626;
      }
      .input-focus:focus-within {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      }
    </style>
  </head>
  <body class="antialiased selection:bg-accent selection:text-white">
    <div class="max-w-xl mx-auto px-6 py-16 min-h-screen flex flex-col">
      <!-- High Contrast Header -->
      <header class="mb-12">
        <h1 class="text-3xl font-black tracking-tight mb-2">Pdf2Pages<span class="text-accent">.</span></h1>
        <p class="text-sm text-neutral-400 font-medium tracking-tight">Convert PDF documents into high-resolution images instantly.</p>
      </header>

      <main class="flex-1">
        <form id="upload-form" class="space-y-6">
          <!-- Accessible Dropzone -->
          <div 
            id="upload-zone" 
            class="group card-border rounded-xl p-10 text-center transition-all hover:bg-neutral-900 cursor-pointer input-focus bg-[#0a0a0a]"
            role="button"
            aria-label="Upload PDF file"
            tabindex="0"
          >
            <div class="space-y-4">
              <div class="mx-auto w-12 h-12 bg-neutral-800 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-accent"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </div>
              <div>
                <p class="text-base font-bold text-white">Choose a PDF file</p>
                <p class="text-sm text-neutral-500">or drag and drop it here</p>
              </div>
            </div>
            <input type="file" id="pdf_file" name="pdf_file" accept="application/pdf" class="hidden" required />
          </div>

          <!-- High Visibility Progress -->
          <div id="progress-container" class="hidden space-y-4 bg-[#0a0a0a] p-6 rounded-xl card-border" aria-live="polite">
            <div class="flex justify-between items-end">
              <div>
                <p id="status-text" class="text-xs font-bold uppercase tracking-widest text-accent mb-1">Processing</p>
                <p id="progress-percent" class="text-3xl font-black">0%</p>
              </div>
              <p id="page-count" class="text-xs font-medium text-neutral-500 uppercase tracking-widest">0 / 0 Pages</p>
            </div>
            <div class="h-2 w-full bg-neutral-900 rounded-full overflow-hidden">
              <div id="progress-bar" class="h-full bg-accent transition-all duration-300 shadow-[0_0_10px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
            </div>
          </div>

          <button 
            type="submit" 
            id="submit-btn"
            class="w-full py-4 rounded-xl bg-white text-black font-extrabold text-sm hover:bg-accent hover:text-white transition-all active:scale-[0.98] disabled:opacity-20 shadow-xl"
          >
            Start Conversion
          </button>
        </form>

        <!-- Improved History -->
        {% if conversions %}
        <section class="mt-20">
          <h2 class="text-xs font-black uppercase tracking-[0.2em] text-neutral-600 mb-6">Recent Projects</h2>
          <div class="space-y-2">
            {% for folder in conversions %}
            <a href="{{ url_for('output', folder=folder) }}" class="flex items-center justify-between p-4 rounded-xl card-border bg-[#0a0a0a] hover:bg-neutral-900 transition-all group">
              <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded-lg bg-neutral-800 flex items-center justify-center text-neutral-400 group-hover:bg-accent/10 group-hover:text-accent transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <p class="text-sm font-semibold text-neutral-300 group-hover:text-white truncate max-w-[200px] transition-colors">{{ folder }}</p>
              </div>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-neutral-700 group-hover:text-accent group-hover:translate-x-1 transition-all"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
            {% endfor %}
          </div>
        </section>
        {% endif %}
      </main>

      <footer class="mt-auto pt-10 text-[10px] font-bold uppercase tracking-widest text-neutral-700 flex justify-between">
        <span>© 2026 Pdf2Pages</span>
        <span class="text-accent/50">Production Ready</span>
      </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
